name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  VERSION: ${{ github.ref_name }}

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Go 1.22
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build Windows binaries (Go)
        run: cd backend && go build -o dist/locktime-svc.exe ./cmd/locktime-svc && go build -o dist/blocker.exe ./cmd/blocker
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: 0

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build and package Electron app (Windows)
        run: cd frontend && npm run dist:win:ci
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            frontend/release/*.exe
            frontend/release/*.yml
          generate_release_notes: true
          draft: false