name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  VERSION: ${{ github.ref_name }}

jobs:
  # ── Windows ────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install protoc (Windows)
        run: choco install protoc --no-progress -y

      - name: Configure CMake (Windows)
        working-directory: backend
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build C++ backend (Windows)
        working-directory: backend
        run: cmake --build build --config Release

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Generate proto resources
        working-directory: desktop
        run: npm run generate-proto

      - name: Build and package Electron app (Windows)
        working-directory: desktop
        run: npm run dist:win:ci
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows installer to release
        uses: softprops/action-gh-release@v2
        with:
          files: desktop/release/*.exe
          generate_release_notes: true

  # ── macOS ──────────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Clean up disk space
        run: |
          df -h
          rm -rf ~/Library/Caches/pip ~/Library/Caches/Homebrew
          df -h

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json

      - name: Install protoc (macOS)
        run: brew install protobuf

      - name: Configure CMake (macOS)
        working-directory: backend
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build C++ backend (macOS)
        working-directory: backend
        run: cmake --build build

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Generate proto resources
        working-directory: desktop
        run: npm run generate-proto

      - name: Build and package Electron app (macOS)
        working-directory: desktop
        run: npm run dist:mac:ci
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS packages to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop/release/*.dmg
