name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  VERSION: ${{ github.ref_name }}

jobs:
  # ── Windows ────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json

      - name: Setup Go 1.22
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build Windows binaries (Go)
        working-directory: backend
        run: |
          go build -ldflags="-s -w -H windowsgui" -o dist/locktime-svc.exe ./cmd/locktime-svc
          go build -ldflags="-s -w -H windowsgui" -o dist/blocker.exe ./cmd/blocker
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: '0'

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Build and package Electron app (Windows)
        working-directory: desktop
        run: npm run dist:win

      - name: Upload Windows installer to release
        uses: softprops/action-gh-release@v2
        with:
          files: desktop/release/*.exe
          generate_release_notes: true

  # ── macOS ──────────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json

      - name: Setup Go 1.22
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build macOS universal binary (Go)
        working-directory: backend
        run: |
          mkdir -p dist
          GOOS=darwin GOARCH=arm64 CGO_ENABLED=0 go build -ldflags="-s -w" -o dist/locktime-svc-arm64 ./cmd/locktime-svc
          GOOS=darwin GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="-s -w" -o dist/locktime-svc-amd64 ./cmd/locktime-svc
          lipo -create -output dist/locktime-svc dist/locktime-svc-arm64 dist/locktime-svc-amd64
          rm dist/locktime-svc-arm64 dist/locktime-svc-amd64

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Build and package Electron app (macOS)
        working-directory: desktop
        run: npm run dist:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload macOS packages to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop/release/*.dmg
